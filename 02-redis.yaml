- name: installing redis server
  hosts: redis
  become: yes
  tasks:
  - name: enabling redis 7
    command: dnf module enable redis:7 -y
  - name: installing redis server
    package:
      name: redis
      state: present
  - name: allow remote connections
    replace:
      path: /etc/redis/redis.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'
  - name: changing protected mode to off
    lineinfile:
     path: /etc/redis/redis.conf
     regexp: 'protected-mode'
     line: 'protected-off'
  - name: enabling and start service
    service:
     name: redis
     state: started
     enabled: yes