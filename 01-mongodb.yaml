- name: configuring mongodb server
  hosts: mongodb
  become: yes
  tasks:
  - name: copying the mongo repo
    copy: 
     src: mongo.repo
     dest: /etc/yum.repos.d/mongo.repo
  - name: installing mongodb server
    package:
     name: mongodb-org
     state: present
  - name: allow remote connections
    replace:
     path: /etc/mongod.conf
     regexp: '127.0.0.1'
     replace: '0.0.0.0'
  - name: system starting service
    service:
      name: mongod
      state: started
      enabled: yes